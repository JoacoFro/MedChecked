<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Medicine Control - Home</title>
    <style>
        .custom-card { background-color: #64e5e5; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .autonomia-box { background-color: #c2f2f2; border-radius: 10px; padding: 15px; margin-top: 10px; }
        .navbar-custom { background-color: #64e5e5; padding: 15px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-custom mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Navbar</span>
            <form class="d-flex" role="search">
                <input class="form-control me-2" type="search" placeholder="Buscador">
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-7">
                
                <div class="custom-card shadow-sm">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5 class="mb-3">Estado Actual</h5>
                        <button class="btn btn-light btn-sm shadow-sm">Ver detalle</button>
                    </div>
                    <p class="mb-1">Progres bar de stock</p>
                    <div class="progress mb-3" style="height: 25px;">
                        <div class="progress-bar bg-primary" role="progressbar" style="width: 75%;"></div>
                    </div>
                    <div class="autonomia-box text-center">
                        <strong>Autonomía</strong>
                        <p class="mb-0">Cálculo de días restantes aquí</p>
                    </div>
                </div>

                <div class="custom-card shadow-sm">
                    <div class="d-flex justify-content-between">
                        <p>Esta caja debe mostrar cuando hacer el próximo pedido</p>
                        <button class="btn btn-light btn-sm align-self-start shadow-sm">Ver registro</button>
                    </div>
                </div>

            </div>

            <div class="col-md-5">
                <div class="custom-card shadow-sm h-100">
                    <h5 class="text-center">Calendario</h5>
                    <div class="table-responsive mt-3">
                        <table class="table table-bordered text-center bg-white">
                            <tbody>
                                {% for i in "1234" %}
                                <tr>
                                    <td></td><td></td><td></td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="navbar-custom text-center p-3 mt-5 fixed-bottom">
        Footer
    </footer>

</body>
</html>
