<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Medicine Control</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --text-color: #f1f5f9;
        }

        /* Configuración para que el footer siempre esté abajo */
        html, body {
            height: 100%;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
        }

        .content-wrapper {
            flex: 1 0 auto; /* Esto empuja el footer hacia abajo */
        }

        .navbar-custom {
            background: #0393e6;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.8rem 2rem;
        }

        .nav-link-custom {
            color: var(--text-color);
            text-decoration: none;
            margin-right: 20px;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .nav-link-custom:hover {
            color: var(--accent-color);
        }

        .custom-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            transition: transform 0.3s ease;
        }

        .footer-custom {
            flex-shrink: 0;
            background: #0393e6;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
        }
        
        /* Estilos de las tarjetas y barras que ya tenías */
        .autonomia-box { background: rgba(56, 189, 248, 0.1); border-left: 4px solid var(--accent-color); border-radius: 10px; }
        .progress { background-color: #334155; border-radius: 20px; }
        .progress-bar { background: linear-gradient(90deg, #0ea5e9, #38bdf8); box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
        .btn-light { background: transparent; color: var(--accent-color); border: 1px solid var(--accent-color); }
        .btn-light:hover { background: var(--accent-color); color: white; }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <nav class="navbar navbar-custom mb-4">
            <div class="container-fluid d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <div class="me-4" style="width: 30px; height: 30px; background: var(--accent-color); border-radius: 8px; box-shadow: 0 0 10px var(--accent-color);"></div>
                        <a href="{% url 'home' %}" class="nav-link-custom fw-bold">Inicio</a>
                        <a href="{% url 'cargar' %}" class="nav-link-custom fw-bold">Agregar Pedido</a>
                        <a class="nav-link" href="{% url 'lista' %}">Ver stock</a>
                        
                    </div>
                
                <div class="d-flex align-items-center">
                    <input type="search" placeholder="Buscador de insumos..." class="form-control form-control-sm bg-dark text-white border-secondary" style="width: 250px; border-radius: 10px;">
                </div>
            </div>
        </nav>

        <div class="container mt-4">
            {% block contenido %}
            {% endblock %}
        </div>
    </div>

    <footer class="footer-custom">
        &copy; 2026 Medicine Control System • Monitoreo de Insumos Médicos
    </footer>

</body>
</html>
